<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Munger Claw — Daily Update History</title>
<style>
  body{margin:0;background:#0a0e14;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;padding:30px}
  .wrap{max-width:720px;margin:0 auto}
  h1{color:#ffb14a;margin:0 0 4px;font-size:22px;letter-spacing:0.5px}
  .sub{color:#8b949e;font-size:13px;margin-bottom:22px}
  a{color:#58a6ff;text-decoration:none}
  a:hover{text-decoration:underline}
  ul{list-style:none;padding:0}
  li{padding:10px 14px;border-bottom:1px solid #1f2a37;display:flex;justify-content:space-between;align-items:center}
  li:hover{background:rgba(255,255,255,0.02)}
  .date{color:#e6edf3;font-weight:500}
  .filename{color:#8b949e;font-size:12px;font-family:monospace}
  .empty{color:#8b949e;font-style:italic;padding:20px 0}
  .nav{margin-bottom:18px;font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <div class="nav"><a href="index.html">← Latest dashboard</a></div>
  <h1>MUNGER CLAW — Daily Update History</h1>
  <div class="sub">All past daily dashboards. Most recent first.</div>
  <ul id="list"><li class="empty">Loading…</li></ul>
</div>
<script>
// Scan backwards 180 days and list every dashboard file that exists.
async function buildList() {
  const today = new Date();
  const found = [];
  for (let i = 0; i < 180; i++) {
    const d = new Date(today.getTime() - i*24*60*60*1000);
    const month = d.toLocaleString('en-US',{month:'long'}).toLowerCase();
    const monthTitle = d.toLocaleString('en-US',{month:'long'});
    const day = d.getDate();
    const year = d.getFullYear();
    const f = `munger_claw_${month}${day}_${year}.html`;
    try {
      const res = await fetch(f,{method:'HEAD'});
      if (res.ok) {
        found.push({file:f, label:`${monthTitle} ${day}, ${year}`});
      }
    } catch(e) {}
  }
  const ul = document.getElementById('list');
  ul.innerHTML = '';
  if (found.length === 0) {
    ul.innerHTML = '<li class="empty">No dashboards found yet.</li>';
    return;
  }
  for (const item of found) {
    const li = document.createElement('li');
    li.innerHTML = `<span class="date"><a href="${item.file}">${item.label}</a></span><span class="filename">${item.file}</span>`;
    ul.appendChild(li);
  }
}
buildList();
</script>
</body>
</html>
